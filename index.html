<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- theme-color pinta a barra de status do sistema, que fica colada no
         cabecalho do app. O cabecalho e `--cor-nav` (#3c3835, carvao) da paleta
         oficial da #71, entao a barra encosta nele sem emenda. O valor antigo
         (#e8541e) era residuo da paleta anterior: nao era o laranja de acao
         (#f45f0d) nem o institucional (#ca6129) — nao pertencia a paleta
         nenhuma. Se mudar aqui, mude tambem em public/manifest.json (#114). -->
    <meta name="theme-color" content="#3c3835" />
    <meta name="description" content="Sistema simples de pedidos para barracas, feiras e negocios de rua." />

    <!-- PWA: instalacao basica -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Barraca Easy" />

    <title>Barraca Easy</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
