name: CI + Deploy (Firebase Hosting)

# Pipeline do Barraca Easy — staging x producao (2 projetos Supabase).
#
# - Todo push/PR: instala deps, lint e build (validacao continua).
# - Push na main: build com as chaves de STAGING + publica no canal "staging".
#   (producao NAO sai no push por seguranca — piloto valida o staging primeiro.)
# - workflow_dispatch (Run workflow) com environment=production: build com as
#   chaves de PRODUCAO + publica no canal "live".
# - repository_dispatch (event_type "deploy-production"): mesmo efeito do
#   dispatch de producao, porem acionavel por API com permissao Contents:write.
#   Existe porque o token do agente e fine-grained e NAO tem Actions:write, o
#   que travava o deploy de producao em cima de quem pudesse clicar no botao
#   (foi assim que a impressora ficou mergeada na main e fora do ar — #67).
# - Pull request: build com chaves de STAGING + canal de preview temporario.
#
# Credenciais publicas do Supabase vem de Repository VARIABLES (a publishable
# key e publica por design, protegida por RLS). Somente FIREBASE_SERVICE_ACCOUNT
# e Secret. Os passos de deploy so rodam se esse secret existir.

on:
  push:
    branches: [ main ]
  pull_request:
  repository_dispatch:
    types: [ deploy-production ]
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de deploy"
        type: choice
        default: staging
        options: [ staging, production ]

# Trava de concorrencia (#104). Dois merges na main em sequencia rapida
# disparavam dois runs publicando no MESMO canal do Firebase, sem ordem
# garantida: o run mais lento podia sobrescrever o mais novo, com os dois
# verdes. O grupo e por canal alvo. Producao NUNCA e cancelada no meio
# (cancel-in-progress false); PR pode cancelar o run velho, que so
# interessa o ultimo commit.
concurrency:
  group: deploy-${{ github.event_name == 'repository_dispatch' && 'production' || (github.event_name == 'workflow_dispatch' && inputs.environment || (github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'staging')) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    # A action do Firebase publica um "check run" e comenta a URL do preview no
    # PR. Sem estas permissoes o GITHUB_TOKEN e read-only e o passo morre com
    # 403 "Resource not accessible by integration" (POST /check-runs).
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Bateria de guardas sem navegador (#108). Sao Node puro, sem servidor
      # nem browser, entao custam segundos e derrubam o CI se alguem quebrar
      # uma regra de negocio critica (senha duplicada, portao offline, sessao
      # offline, assinatura, LGPD, roteamento, diario do piloto, contraste).
      # Os que dependem de navegador (fale-com-dev, lgpd, rotas-navegador)
      # ficam de fora por enquanto — custo de browser no runner e decisao a
      # parte.
      - name: Testes sem navegador
        run: |
          npm run senha-automatica
          npm run teclado
          npm run portao-offline
          npm run sessao-offline
          npm run contraste
          npm run rotas
          npm run diario-piloto
          npm run assinatura
          npm run aviso-fiscal

      - name: Resolver ambiente alvo
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.environment }}" = "production" ]; then
            echo "env=production" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "env=production" >> "$GITHUB_OUTPUT"
          else
            echo "env=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Selecionar chaves Supabase do ambiente
        id: sb
        run: |
          if [ "${{ steps.target.outputs.env }}" = "production" ]; then
            echo "url=${{ vars.SUPABASE_URL_PRODUCTION }}" >> "$GITHUB_OUTPUT"
            echo "key=${{ vars.SUPABASE_PUBLISHABLE_KEY_PRODUCTION }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${{ vars.SUPABASE_URL_STAGING }}" >> "$GITHUB_OUTPUT"
            echo "key=${{ vars.SUPABASE_PUBLISHABLE_KEY_STAGING }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checar credenciais Supabase do ambiente
        run: |
          if [ -z "${{ steps.sb.outputs.url }}" ] || [ -z "${{ steps.sb.outputs.key }}" ]; then
            echo "::error::Faltam VARIABLES do Supabase para o ambiente '${{ steps.target.outputs.env }}'. Configure SUPABASE_URL_* e SUPABASE_PUBLISHABLE_KEY_* em Settings > Variables."
            exit 1
          fi

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ steps.sb.outputs.url }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ steps.sb.outputs.key }}
        run: npm run build

      # Carimbo do que foi construido. Serve de prova de conteudo na
      # verificacao pos-deploy e para saber se a main esta a frente do que
      # esta no ar, sem inspecionar bundle na mao (#104).
      - name: Carimbar versao no dist
        run: |
          printf '{"sha":"%s","ref":"%s","env":"%s","built_at":"%s"}\n' \
            "${{ github.sha }}" "${{ github.ref_name }}" \
            "${{ steps.target.outputs.env }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > dist/version.json
          cat dist/version.json

      - name: Deploy STAGING (push na main / dispatch staging)
        id: deploy_staging
        if: ${{ steps.target.outputs.env == 'staging' && github.event_name != 'pull_request' && env.FIREBASE_SERVICE_ACCOUNT != '' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: staging
          expires: 30d

      - name: Deploy PREVIEW (pull request)
        if: ${{ github.event_name == 'pull_request' && env.FIREBASE_SERVICE_ACCOUNT != '' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          expires: 7d

      - name: Deploy PRODUCAO (workflow_dispatch production ou repository_dispatch)
        id: deploy_producao
        if: ${{ steps.target.outputs.env == 'production' && env.FIREBASE_SERVICE_ACCOUNT != '' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: live

      # CI verde nao e prova de deploy (#104, #124). Este passo baixa o que o
      # canal esta SERVINDO e exige: (a) o version.json carimbado com o commit
      # deste run e (b) que o bundle de entrada do index.html publicado exista
      # de verdade, com content-type de JavaScript. O (b) importa porque o
      # rewrite de SPA devolve 200 + HTML para arquivo inexistente — "deu 200"
      # nunca provou publicacao.
      - name: Verificar bundle publicado (por conteudo)
        if: ${{ github.event_name != 'pull_request' && env.FIREBASE_SERVICE_ACCOUNT != '' }}
        run: |
          set -uo pipefail
          if [ "${{ steps.target.outputs.env }}" = "production" ]; then
            BASE="https://${{ vars.FIREBASE_PROJECT_ID }}.web.app"
          else
            BASE="${{ steps.deploy_staging.outputs.details_url }}"
          fi
          if [ -z "$BASE" ]; then
            echo "::error::URL do canal vazia; nao da para verificar o que foi publicado."
            exit 1
          fi
          node scripts/verifica-publicado.mjs "$BASE" \
            --sha=${{ github.sha }} --tentativas=6 --intervalo=10

      # Depois de publicar staging, avisa se producao ficou para tras. Foi
      # esse silencio que deixou #102/#103 mergeados e fora do ar (e antes
      # deles a impressora, #67).
      - name: Avisar se a producao esta atrasada
        if: ${{ steps.target.outputs.env == 'staging' && github.event_name == 'push' && env.FIREBASE_SERVICE_ACCOUNT != '' }}
        run: |
          PROD=$(curl -fsS -H 'Cache-Control: no-cache' "https://${{ vars.FIREBASE_PROJECT_ID }}.web.app/version.json" || echo '')
          SHA=$(printf '%s' "$PROD" | jq -r '.sha // empty' 2>/dev/null || echo '')
          if [ "$SHA" = "${{ github.sha }}" ]; then
            echo "Producao esta em dia com a main." >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Producao esta ATRASADA em relacao a main"
              echo ""
              echo "- main: ${{ github.sha }}"
              echo "- producao servindo: ${SHA:-desconhecido}"
              echo ""
              echo "Para publicar: Actions > Run workflow com environment=production,"
              echo "ou repository_dispatch do tipo deploy-production."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Producao esta atrasada em relacao a main (${SHA:-desconhecido} != ${{ github.sha }})."
          fi
