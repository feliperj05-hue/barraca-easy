name: (fallback manual) Deploy to GitHub Pages

# Fallback OPCIONAL e MANUAL de hosting.
#
# O host de producao APROVADO e o Firebase Hosting (.github/workflows/deploy.yml,
# staging + producao). Este workflow existe so como plano B "sem Firebase":
# publica o mesmo build estatico no GitHub Pages, num subpath
# (https://feliperj05-hue.github.io/barraca-easy/).
#
# Por isso NAO dispara no push da main (senao publicaria em duas URLs ao mesmo
# tempo, brigando com o Firebase). Rode a mao em Actions > Run workflow quando
# quiser um deploy sem depender do Firebase.
#
# Backend Supabase: as credenciais publicas (publishable, protegidas por RLS)
# entram no bundle via Repository Variables (VITE_SUPABASE_URL / _PUBLISHABLE_KEY).

on:
  workflow_dispatch:

# Permissoes necessarias para o deploy-pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Garante uma unica publicacao concorrente, sem cancelar deploys em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Falha cedo e com mensagem clara se as Repository Variables do Supabase
      # nao estiverem configuradas (Settings > Secrets and variables > Actions
      # > Variables). Nao imprime o valor da key.
      - name: Check Supabase env vars
        run: |
          missing=0
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "::error::VITE_SUPABASE_URL vazia. Crie a Repository Variable em Settings > Secrets and variables > Actions > Variables."
            missing=1
          else
            echo "VITE_SUPABASE_URL definida: $VITE_SUPABASE_URL"
          fi
          if [ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ]; then
            echo "::error::VITE_SUPABASE_PUBLISHABLE_KEY vazia. Crie a Repository Variable em Settings > Secrets and variables > Actions > Variables."
            missing=1
          else
            echo "VITE_SUPABASE_PUBLISHABLE_KEY definida (prefixo: ${VITE_SUPABASE_PUBLISHABLE_KEY:0:15}...)"
          fi
          exit $missing

      # GitHub Pages serve num subpath, entao sobrescreve a base "/" do
      # vite.config (que e a base do Firebase, host de producao).
      - name: Build
        run: npm run build -- --base=/barraca-easy/

      - name: SPA fallback (404.html)
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
