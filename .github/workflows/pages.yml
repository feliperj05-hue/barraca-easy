name: Deploy to GitHub Pages

# Publica o build de producao (Vite) no GitHub Pages.
# Hosting estatico: o app roda no cliente; credenciais Supabase (publishable,
# publicas por design) sao injetadas no build via Repository Variables.
# URL final: https://feliperj05-hue.github.io/barraca-easy/

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Permissoes necessarias para o deploy-pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Garante uma unica publicacao concorrente, sem cancelar deploys em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Falha cedo e com mensagem clara se as Repository Variables do Supabase
      # nao estiverem configuradas (Settings > Secrets and variables > Actions
      # > Variables). Nao imprime o valor da key.
      - name: Check Supabase env vars
        run: |
          missing=0
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "::error::VITE_SUPABASE_URL vazia. Crie a Repository Variable em Settings > Secrets and variables > Actions > Variables."
            missing=1
          else
            echo "VITE_SUPABASE_URL definida: $VITE_SUPABASE_URL"
          fi
          if [ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ]; then
            echo "::error::VITE_SUPABASE_PUBLISHABLE_KEY vazia. Crie a Repository Variable em Settings > Secrets and variables > Actions > Variables."
            missing=1
          else
            echo "VITE_SUPABASE_PUBLISHABLE_KEY definida (prefixo: ${VITE_SUPABASE_PUBLISHABLE_KEY:0:15}...)"
          fi
          exit $missing

      - name: Build
        run: npm run build

      - name: SPA fallback (404.html)
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
