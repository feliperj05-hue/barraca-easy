name: Deploy to GitHub Pages

# Publica o build de producao (Vite) no GitHub Pages.
# Hosting estatico: o app roda 100% no cliente com localStorage.
# URL final: https://feliperj05-hue.github.io/barraca-easy/

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Permissoes necessarias para o deploy-pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Garante uma unica publicacao concorrente, sem cancelar deploys em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: SPA fallback (404.html)
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
